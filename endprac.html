<!DOCTYPE html>
<html>
<head>
    <title>Sum of N Numbers</title>
    <link rel="stylesheet" href="index1.css">
</head>
<body>

    <h2>Sum of Numbers from 1 to N</h2>

    Enter N: <input type="number" id="num">
    <button onclick="findSum()">Calculate</button>

    <h3 id="result"></h3>

    <script>
        function findSum() {
            let n = parseInt(document.getElementById("num").value);
            let sum = 0;

            for (let i = 1; i <= n; i++) {
                sum = sum + i;
            }

            document.getElementById("result").innerHTML =
                "Sum = " + sum;
        }
    </script>

</body>
</html>
